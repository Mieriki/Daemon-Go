# 进程守护配置
# 此配置文件由主守护 (A) 和备守护 (B) 共用

# 当前实例标识，a 为主守护，b 为备守护
# 命令行参数 --instance 会覆盖此值
instance: a

# 日志目录
logDir: logs

# 暂停/运行状态文件
stateFile: daemon.state

# Web 控制台监听地址（仅限本机访问）
webHost: 127.0.0.1
webPort: 18080

# 对端互保配置
peer:
  # 对端实例标识
  instanceId: b
  # 对端服务名（留空则自动推导为 ProcessGuard-b）
  serviceName: ""
  # 检查间隔（秒）
  checkInterval: 10
  # 对端服务异常时执行的拉起脚本（可选，通常 B 用不到）
  startScript: ""

# runCommand 动作允许列表（安全相关）
# 若未配置任何允许命令，runCommand 将拒绝执行任意命令。
# 示例：
# allowedCommands:
#   - path: "D:\\Tools\\kill-xjar.bat"
#     argsPattern: ""
allowedCommands: []

# 被守护项目列表
# 安装后请先在此配置需要守护的项目，再重启服务生效
projects: []
