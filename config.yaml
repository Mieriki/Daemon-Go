# 进程守护配置
# 此配置文件由主守护 (A) 和备守护 (B) 共用

# 当前实例标识，a 为主守护，b 为备守护
# 命令行参数 --instance 会覆盖此值
instance: a

# 日志目录
logDir: logs

# 暂停/运行状态文件
stateFile: daemon.state

# Web 控制台监听地址（仅限本机访问）
webHost: 127.0.0.1
webPort: 18080

# 对端互保配置
peer:
  # 对端实例标识
  instanceId: b
  # 对端服务名（留空则自动推导为 ProcessGuard-b）
  serviceName: ""
  # 检查间隔（秒）
  checkInterval: 10
  # 对端服务异常时执行的拉起脚本（可选，通常 B 用不到）
  startScript: ""

# runCommand 动作允许列表（安全相关）
# 若未配置任何允许命令，runCommand 将拒绝执行任意命令。
# 示例：
# allowedCommands:
#   - path: "D:\\Tools\\kill-xjar.bat"
#     argsPattern: ""
allowedCommands: []

# 被守护项目列表
projects:
  - name: YourApp
    enabled: true

    # 监控方式：port / process / mixed
    monitor:
      type: port
      port: 8080
      host: 127.0.0.1
      # 若用进程名监控，可配置：
      # processName: app.exe

    # 检查间隔（秒）
    checkInterval: 15

    # 启动超时（秒）
    startupTimeout: 60

    # 连续失败最大重启次数
    maxRestartAttempts: 3

    # 重启间隔（秒）
    restartDelay: 10

    # 启动模式：async 异步（推荐）/ sync 同步
    # async：脚本启动业务后立即返回，由守护进程轮询检测
    # sync：等待脚本执行完成后才返回
    startMode: async

    # 项目启动脚本路径（支持相对路径和绝对路径）
    startScript: "Start.bat"

    # 项目停止脚本路径（可选）
    stopScript: "Stop.bat"

    # 前置动作：运行 startScript 之前执行
    preActions: []

    # 后置动作：确认项目启动成功后执行
    postActions: []

  # 可继续添加更多项目
  # - name: AnotherSystem
  #   enabled: false
  #   monitor:
  #     type: port
  #     port: 8080
  #   startScript: "AnotherStart.bat"
